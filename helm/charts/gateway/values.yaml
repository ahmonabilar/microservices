replicaCount: 1

image:
  repository: gateway
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 443
  targetPort: 8080

ingress:
  enabled: true
  host: blazorapp.gateway.local
  tls:
    secretName: gateway-tls

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
  Identity__Authority: "http://identity:443"
  RabbitMQ__Host: "rabbitmq"
  RabbitMQ__Username: "user"
  RabbitMQ__Password: "password"
