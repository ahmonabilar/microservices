apiVersion: v1
kind: Service
metadata:
  name: '{{ include "identity.fullname" . }}'
  labels:
    app: '{{ include "identity.fullname" . }}'
spec:
  type: "{{ .Values.service.type }}"
  selector:
    app: '{{ include "identity.fullname" . }}'
  ports:
    - name: https
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
